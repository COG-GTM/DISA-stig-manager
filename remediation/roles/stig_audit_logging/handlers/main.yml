---
# Handlers for audit logging role

- name: Restart auditd
  ansible.builtin.command:
    cmd: service auditd restart
  changed_when: true

- name: Load audit rules
  ansible.builtin.command:
    cmd: augenrules --load
  changed_when: true

- name: Regenerate GRUB config
  ansible.builtin.command:
    cmd: grub2-mkconfig -o /boot/grub2/grub.cfg
  changed_when: true
