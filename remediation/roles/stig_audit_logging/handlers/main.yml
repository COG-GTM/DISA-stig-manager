---
# Handlers for audit logging role

- name: Restart auditd
  ansible.builtin.command:
    cmd: service auditd restart
  changed_when: true

- name: Load audit rules
  ansible.builtin.command:
    cmd: augenrules --load
  changed_when: true

- name: Rebuild initramfs
  ansible.builtin.command:
    cmd: dracut -f
  changed_when: true
