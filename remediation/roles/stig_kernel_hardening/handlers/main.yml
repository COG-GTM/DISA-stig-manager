---
# Handlers for kernel hardening role

- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true

- name: Update module dependencies
  ansible.builtin.command:
    cmd: depmod -a
  changed_when: true

- name: Rebuild initramfs
  ansible.builtin.command:
    cmd: dracut -f
  changed_when: true
