---
# DISA RHEL 9 STIG - Kernel Hardening Remediation
# Controls: CM-6, SC-7, SI-16, SC-5
# Covers: V-258080 through V-258115

# --- Sysctl parameters ---

- name: V-258080-V-258096 | CAT II | CM-6 | Apply kernel security parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-stig-hardening.conf
  loop: "{{ stig_kernel_params | dict2items }}"
  tags: [V-258080, cat2, cm-6, sc-7]

# --- Disable unnecessary kernel modules ---

- name: V-258097-V-258108 | CAT II | CM-7 | Disable unnecessary kernel modules
  ansible.builtin.copy:
    dest: "/etc/modprobe.d/stig-{{ item }}.conf"
    content: |
      # DISA STIG: Disable {{ item }} module
      install {{ item }} /bin/false
      blacklist {{ item }}
    owner: root
    group: root
    mode: "0644"
  loop: "{{ stig_disabled_modules }}"
  notify: Update module dependencies
  tags: [V-258097, cat2, cm-7]

# --- Core dump restrictions ---

- name: V-258109 | CAT II | CM-6 | Disable core dumps via limits.conf
  ansible.builtin.copy:
    dest: /etc/security/limits.d/99-stig-coredump.conf
    content: |
      # DISA STIG V-258109: Disable core dumps
      *               hard    core            0
    owner: root
    group: root
    mode: "0644"
  when: stig_disable_core_dumps
  tags: [V-258109, cat2, cm-6]

- name: V-258110 | CAT II | CM-6 | Disable core dumps via systemd
  ansible.builtin.lineinfile:
    path: /etc/systemd/coredump.conf
    regexp: '^(#\s*)?Storage='
    line: "Storage=none"
    insertafter: '^\[Coredump\]'
  when: stig_disable_core_dumps
  tags: [V-258110, cat2, cm-6]

- name: V-258111 | CAT II | CM-6 | Set ProcessSizeMax to 0 for coredumps
  ansible.builtin.lineinfile:
    path: /etc/systemd/coredump.conf
    regexp: '^(#\s*)?ProcessSizeMax='
    line: "ProcessSizeMax=0"
    insertafter: '^\[Coredump\]'
  when: stig_disable_core_dumps
  tags: [V-258111, cat2, cm-6]

# --- FIPS mode ---

- name: V-258112 | CAT I | SC-13 | Check FIPS mode status
  ansible.builtin.command:
    cmd: fips-mode-setup --check
  register: fips_status
  changed_when: false
  failed_when: false
  tags: [V-258112, cat1, sc-13]

- name: V-258112 | CAT I | SC-13 | Enable FIPS mode if not active
  ansible.builtin.command:
    cmd: fips-mode-setup --enable
  when: "'is enabled' not in fips_status.stdout"
  notify: Rebuild initramfs
  tags: [V-258112, cat1, sc-13]

# --- Restrict ptrace ---

- name: V-258113 | CAT II | CM-6 | Restrict ptrace scope
  ansible.posix.sysctl:
    name: kernel.yama.ptrace_scope
    value: "1"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-stig-hardening.conf
  tags: [V-258113, cat2, cm-6]

# --- Verification tasks ---

- name: Verify | ASLR is enabled
  ansible.builtin.command:
    cmd: sysctl kernel.randomize_va_space
  register: verify_aslr
  changed_when: false
  failed_when: "'2' not in verify_aslr.stdout"
  tags: [verify, V-258080]

- name: Verify | Core dumps are disabled
  ansible.builtin.command:
    cmd: grep -c "core" /etc/security/limits.d/99-stig-coredump.conf
  register: verify_coredump
  changed_when: false
  failed_when: verify_coredump.rc != 0
  when: stig_disable_core_dumps
  tags: [verify, V-258109]

- name: Verify | USB storage module is blacklisted
  ansible.builtin.command:
    cmd: grep -c "blacklist usb-storage" /etc/modprobe.d/stig-usb-storage.conf
  register: verify_usb
  changed_when: false
  failed_when: verify_usb.rc != 0
  tags: [verify, V-258097]
